services:
  ntk-service:
    container_name: ntk-service
    build:
      context: ..
      dockerfile: deployments/Dockerfile.service
    image: nettoolskit/ntk-service:local
    ports:
      - "8080:8080"
    environment:
      NTK_RUNTIME_MODE: service
      NTK_LOG_LEVEL: info
      NTK_TASK_MAX_CONCURRENCY: "2"
      NTK_TASK_MAX_RETRIES: "2"
      NTK_TASK_QUEUE_CAPACITY: "128"
      XDG_DATA_HOME: /var/lib/ntk
      XDG_CONFIG_HOME: /var/lib/ntk/config
    volumes:
      - ../.temp/service-data:/var/lib/ntk
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped