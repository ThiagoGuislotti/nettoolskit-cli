# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
]
all-features = true

# ─── Advisories ──────────────────────────────────────────────────
[advisories]
# Deny any crate with a known security vulnerability
vulnerability = "deny"
# Warn on unmaintained crates
unmaintained = "warn"
# Warn on crates that have been yanked
yanked = "warn"
# Warn on crates with open notices
notice = "warn"

# ─── Licenses ────────────────────────────────────────────────────
[licenses]
# Deny unlicensed crates
unlicensed = "deny"
# Deny copyleft-licensed crates
copyleft = "deny"
# Allow common permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
]
# Confidence threshold for license detection
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ─── Bans ─────────────────────────────────────────────────────────
[bans]
# Deny multiple versions of the same crate (warn for now, tighten later)
multiple-versions = "warn"
# Allow wildcard dependencies (workspace uses exact versions)
wildcards = "allow"
highlight = "all"

# ─── Sources ──────────────────────────────────────────────────────
[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
