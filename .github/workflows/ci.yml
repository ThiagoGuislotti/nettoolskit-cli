name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  # ─── Format Check ──────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ─── Lint ───────────────────────────────────────────────────────
  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.os }}
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ─── Build & Test ──────────────────────────────────────────────
  test:
    name: Test (${{ matrix.toolchain }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        toolchain: [stable]
        include:
          - os: ubuntu-latest
            toolchain: nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}-${{ matrix.toolchain }}
      - name: Build workspace
        run: cargo build --workspace
      - name: Run tests
        run: cargo test --workspace

  # ─── AI Safety/Resilience Gate ────────────────────────────────
  ai-gate:
    name: AI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ai-gate
      - name: Run AI E2E command scenarios
        run: cargo test -p nettoolskit-orchestrator --test test_suite e2e_ai_
      - name: Run AI safety and resilience slices
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p nettoolskit-orchestrator --lib process_ai_command_
          cargo test -p nettoolskit-orchestrator --lib request_ai_stream_with_retry_
          cargo test -p nettoolskit-orchestrator --lib evaluate_ai_rate_limit_

  # ─── Dual Runtime Validation Gate ─────────────────────────────
  dual-runtime-gate:
    name: Dual Runtime Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: dual-runtime-gate
      - name: Runtime mode contract tests
        run: cargo test -p nettoolskit-core runtime_mode_
      - name: Task service orchestration tests
        run: cargo test -p nettoolskit-orchestrator --test test_suite test_process_task_
      - name: Service endpoint tests
        run: cargo test -p nettoolskit-cli --bin ntk service_mode_
      - name: Docker compose profile validation
        run: docker compose -f deployments/docker-compose.local.yml config
      - name: Docker service smoke test
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f deployments/docker-compose.local.yml up --build -d

          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:8080/health" | grep -q '"status":"ok"'; then
              break
            fi
            sleep 2
          done

          curl -fsS "http://127.0.0.1:8080/health" | tee /tmp/ntk-health.json
          grep -q '"runtime_mode":"service"' /tmp/ntk-health.json

          curl -fsS -X POST "http://127.0.0.1:8080/task/submit" \
            -H "Content-Type: application/json" \
            -d '{"intent":"ai-plan","payload":"ci dual runtime smoke"}' | tee /tmp/ntk-submit.json
          grep -q '"accepted":true' /tmp/ntk-submit.json
      - name: Docker logs on failure
        if: failure()
        run: docker compose -f deployments/docker-compose.local.yml logs --no-color
      - name: Docker compose down
        if: always()
        run: docker compose -f deployments/docker-compose.local.yml down -v

  # ─── Parallel Stress (templating) ─────────────────────────────
  templating-parallel-stress:
    name: Templating Parallel Stress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: templating-parallel-stress
      - name: Stress templating concurrency tests
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..10}; do
            echo "[parallel-stress] iteration ${i}/10"
            cargo test -p nettoolskit-templating --all-targets -- --test-threads=16
          done

  # ─── Code Coverage ─────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage reports
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage
          cargo llvm-cov --workspace --all-targets --lcov --output-path coverage/lcov.info --fail-under-lines 65 --fail-under-functions 70
          cargo llvm-cov report --html --output-dir coverage
          cargo llvm-cov report --json --summary-only --output-path coverage/summary.json
      - name: Publish coverage summary
        shell: bash
        run: |
          set -euo pipefail
          lines="$(jq -r '.data[0].totals.lines.percent' coverage/summary.json)"
          functions="$(jq -r '.data[0].totals.functions.percent' coverage/summary.json)"
          regions="$(jq -r '.data[0].totals.regions.percent' coverage/summary.json)"
          {
            echo "### Coverage Summary"
            echo ""
            echo "| Metric | Percent |"
            echo "|---|---:|"
            echo "| Lines | ${lines}% |"
            echo "| Functions | ${functions}% |"
            echo "| Regions | ${regions}% |"
            echo ""
            echo "HTML report available in artifact \`coverage-report\`."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/summary.json
            coverage/html
          retention-days: 30
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Security Audit ────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Run cargo-deny
        run: cargo deny check

  # ─── Benchmarks (informational) ────────────────────────────────
  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench
      - name: Run benchmarks
        run: cargo bench --workspace -- --output-format bencher | tee bench-output.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench-output.txt
          retention-days: 30

  # ─── MSRV Check ────────────────────────────────────────────────
  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - name: Check MSRV
        run: cargo check --workspace