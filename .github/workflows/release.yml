name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  BINARY_NAME: ntk

jobs:
  # ─── Create Release ────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$tag' is invalid. Expected format: vMAJOR.MINOR.PATCH[-PRERELEASE]"
            exit 1
          fi

          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - name: Validate tag version matches crate version
        shell: bash
        run: |
          expected_version="${{ steps.get_version.outputs.version }}"
          pkgid="$(cargo pkgid -p nettoolskit-cli)"
          crate_version="${pkgid##*@}"

          if [[ "$crate_version" != "$expected_version" ]]; then
            echo "::error::Tag version '$expected_version' does not match nettoolskit-cli version '$crate_version'."
            exit 1
          fi
      - name: Detect prerelease channel
        id: channel
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate compatibility policy document
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f COMPATIBILITY.md ]]; then
            echo "::error::COMPATIBILITY.md not found."
            exit 1
          fi

          grep -q "^## Compatibility Matrix" COMPATIBILITY.md || {
            echo "::error::COMPATIBILITY.md is missing 'Compatibility Matrix' section."
            exit 1
          }
          grep -q "^## Support Policy" COMPATIBILITY.md || {
            echo "::error::COMPATIBILITY.md is missing 'Support Policy' section."
            exit 1
          }
      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          version="${{ steps.get_version.outputs.version }}"
          if [[ ! -f CHANGELOG.md ]]; then
            echo "::error::CHANGELOG.md not found."
            exit 1
          fi

          awk -v version="$version" '
            /^## \[/ {
              if (capture) { exit }
              if ($0 == "## [" version "]" || index($0, "## [" version "] -") == 1) {
                capture = 1
              }
            }
            capture { print }
          ' CHANGELOG.md > release_notes.md

          if [[ ! -s release_notes.md ]]; then
            echo "::error::Missing changelog section for version [$version]."
            echo "Expected heading like: ## [$version] - YYYY-MM-DD"
            exit 1
          fi
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.get_version.outputs.version }}"
          body_path: release_notes.md
          draft: true
          prerelease: ${{ steps.channel.outputs.prerelease }}

  # ─── SBOM Generation (CycloneDX + SPDX) ───────────────────────
  sbom:
    name: SBOM (CycloneDX + SPDX)
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-sbom
      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked
      - name: Generate SBOM files
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          base="${BINARY_NAME}-${version}-sbom"

          cargo sbom --project-directory . --output-format cyclone_dx_json_1_6 > "${base}.cyclonedx.json"
          cargo sbom --project-directory . --output-format spdx_json_2_3 > "${base}.spdx.json"

          ls -lh "${base}.cyclonedx.json" "${base}.spdx.json"
      - name: Upload SBOM release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.cyclonedx.json
            *.spdx.json

  # ─── Build Binaries ────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --package nettoolskit-cli

      # ── Generate shell completions ──
      - name: Generate shell completions
        shell: bash
        run: |
          mkdir -p completions
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            binary="target/${{ matrix.target }}/release/${BINARY_NAME}.exe"
          else
            binary="target/${{ matrix.target }}/release/${BINARY_NAME}"
          fi
          # Only generate if binary can run on host
          if [[ "${{ matrix.target }}" != "aarch64-unknown-linux-gnu" ]]; then
            for shell in bash zsh fish powershell; do
              "$binary" completions "$shell" > "completions/${BINARY_NAME}.${shell}" 2>/dev/null || true
            done
          fi

      # ── Package ──
      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          staging="${BINARY_NAME}-${version}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$staging/"
          cp README.md COMPATIBILITY.md LICENSE* CHANGELOG.md "$staging/" 2>/dev/null || true
          if [ -d completions ] && [ "$(ls -A completions)" ]; then
            cp -r completions "$staging/"
          fi
          tar czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"
      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ needs.create-release.outputs.version }}"
          $staging = "${env:BINARY_NAME}-${version}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $staging
          Copy-Item "target/${{ matrix.target }}/release/${env:BINARY_NAME}.exe" $staging
          Copy-Item README.md, CHANGELOG.md, COMPATIBILITY.md -Destination $staging -ErrorAction SilentlyContinue
          if (Test-Path completions) {
            Copy-Item -Recurse completions $staging
          }
          Compress-Archive -Path $staging -DestinationPath "${staging}.zip"
          echo "ASSET=${staging}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

      # ── Checksums ──
      - name: Generate checksum
        shell: bash
        run: |
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            sha256sum "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          else
            sha256sum "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          fi
      - name: Upload checksum
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}.sha256

  # ─── Sign Release Assets (Keyless Cosign) ─────────────────────
  sign-release-assets:
    name: Sign Release Assets
    needs:
      - create-release
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Install GitHub CLI (linux fallback)
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Download release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${{ needs.create-release.outputs.version }}"

          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --pattern "${BINARY_NAME}-${version}-*" --clobber
      - name: Sign assets with cosign keyless
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          signed_count=0
          for file in *; do
            if [[ ! -f "$file" ]]; then
              continue
            fi
            if [[ "$file" == *.sig || "$file" == *.pem ]]; then
              continue
            fi

            cosign sign-blob --yes \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              "$file"
            signed_count=$((signed_count + 1))
          done

          if [[ "$signed_count" -eq 0 ]]; then
            echo "No release assets found to sign."
            exit 1
          fi
      - name: Upload signature assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.sig
            *.pem

  # ─── Post-Release Smoke Test ───────────────────────────────────
  smoke-test-release-assets:
    name: Smoke Test Release Assets (${{ matrix.target }})
    needs:
      - create-release
      - build
      - sign-release-assets
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - name: Install GitHub CLI (linux fallback)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Download and smoke test release assets (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${{ needs.create-release.outputs.version }}"
          base="${BINARY_NAME}-${version}-${{ matrix.target }}"
          archive="${base}.${{ matrix.archive }}"
          checksum="${archive}.sha256"

          for attempt in {1..5}; do
            if gh release download "$tag" --repo "$GITHUB_REPOSITORY" --pattern "$archive" --pattern "$checksum" --clobber; then
              break
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "Failed to download release assets after retries"
              exit 1
            fi
            sleep 10
          done

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum -c "$checksum"
          else
            shasum -a 256 -c "$checksum"
          fi

          tar xzf "$archive"

          "./$base/${BINARY_NAME}" --version
          "./$base/${BINARY_NAME}" --help >/dev/null
          "./$base/${BINARY_NAME}" manifest --help >/dev/null

      - name: Download and smoke test release assets (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          $tag = "${env:GITHUB_REF_NAME}"
          $version = "${{ needs.create-release.outputs.version }}"
          $base = "${env:BINARY_NAME}-${version}-${{ matrix.target }}"
          $archive = "$base.${{ matrix.archive }}"
          $checksum = "$archive.sha256"

          for ($attempt = 1; $attempt -le 5; $attempt++) {
            gh release download $tag --repo $env:GITHUB_REPOSITORY --pattern $archive --pattern $checksum --clobber
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq 5) {
              throw "Failed to download release assets after retries."
            }
            Start-Sleep -Seconds 10
          }

          $checksumLine = (Get-Content $checksum | Select-Object -First 1).Trim()
          $expectedHash = ($checksumLine -split '\s+')[0].ToLowerInvariant()
          $actualHash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($expectedHash -ne $actualHash) {
            throw "Checksum mismatch for $archive"
          }

          Expand-Archive -Path $archive -DestinationPath .

          $binaryPath = Join-Path $base "${env:BINARY_NAME}.exe"
          & $binaryPath --version
          & $binaryPath --help | Out-Null
          & $binaryPath manifest --help | Out-Null
